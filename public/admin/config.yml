backend:
  name: github
  repo: jameboykks/ngocbandecal
  branch: main
  base_url: https://ngocbandecal.vercel.app
  auth_endpoint: api/auth

# Where uploaded images go (relative to repo root)
media_folder: "public/images/ngoc-ban/uploads"
public_folder: "/images/ngoc-ban/uploads"

# Force published commits straight to main
publish_mode: simple

site_url: https://ngocbandecal.vercel.app
display_url: https://ngocbandecal.vercel.app
logo_url: https://ngocbandecal.vercel.app/favicon.svg
locale: vi

collections:
  # ============================================================
  # Settings (file collection — single instances)
  # ============================================================
  - name: settings
    label: "⚙️ Cài đặt chung"
    delete: false
    editor:
      preview: false
    files:
      - file: src/content/site.json
        name: site
        label: "Thông tin shop"
        fields:
          - { name: name,        label: "Tên ngắn",        widget: string }
          - { name: fullName,    label: "Tên đầy đủ",      widget: string }
          - { name: owner,       label: "Chủ shop",        widget: string }
          - {
              name: yearsOfExperience,
              label: "Năm kinh nghiệm (số nguyên — VD: 6)",
              widget: number,
              value_type: int,
              min: 1,
              step: 1,
              hint: "Sửa con số này → tự đồng bộ Hero stats card 'Năm kinh nghiệm' + Why Us card 1 ('X+ Năm Kinh Nghiệm') và mọi nơi hiển thị 'X+ năm kinh nghiệm'."
            }
          - {
              name: experience,
              label: "(Tự sinh) Câu năm kinh nghiệm",
              widget: string,
              required: false,
              hint: "KHÔNG cần sửa — code tự sinh từ trường ở trên. Field giữ lại để tránh lỗi schema."
            }
          - { name: address,     label: "Địa chỉ",         widget: string }
          - { name: hotline,     label: "Hotline (hiển thị)", widget: string }
          - { name: hotlineRaw,  label: "Hotline (số sạch để gọi)", widget: string }
          - { name: email,       label: "Email",           widget: string }
          - { name: hours,       label: "Giờ làm việc",    widget: string }
          - { name: facebook,    label: "Link Facebook",   widget: string }
          - { name: tiktok,      label: "Link TikTok",     widget: string }
          - { name: zalo,        label: "Link Zalo",       widget: string }
          - { name: messenger,   label: "Link Messenger",  widget: string }
          - { name: maps,        label: "Link Google Maps",widget: string }
          - { name: socialProof, label: "Câu social proof",widget: string }

      - file: src/content/stats.json
        name: stats
        label: "Số liệu Hero (4 con số)"
        fields:
          - name: items
            label: Stats
            widget: list
            min: 4
            max: 4
            summary: "{{fields.value}} {{fields.label}}"
            hint: "Lưu ý: card có nhãn 'Năm kinh nghiệm' bị override tự động từ Cài đặt chung > Năm kinh nghiệm. Sửa value ở đây sẽ không có hiệu lực — chỉnh ở Cài đặt chung."
            fields:
              - { name: value, label: "Giá trị (vd: 5000+)", widget: string }
              - { name: label, label: "Nhãn (vd: Khách hàng)", widget: string }

      - file: src/content/brands.json
        name: brands
        label: "Hãng xe (marquee)"
        fields:
          - name: items
            label: "Danh sách hãng (chữ in hoa)"
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Tên hãng (vd: PORSCHE)", widget: string }

      - file: src/content/whyUs.json
        name: whyUs
        label: "Vì sao chọn Ngọc Bàn (4 mục)"
        fields:
          - name: items
            label: Items
            widget: list
            min: 4
            max: 4
            summary: "{{fields.title}}"
            hint: "Lưu ý: tiêu đề mục #1 (về số năm kinh nghiệm) bị override tự động từ Cài đặt chung > Năm kinh nghiệm. Sửa title ở đây sẽ không có hiệu lực — chỉnh ở Cài đặt chung."
            fields:
              - { name: icon,  label: "Icon (trophy/shield/hand/doc)", widget: select, options: [trophy, shield, hand, doc] }
              - { name: title, label: "Tiêu đề",       widget: string }
              - { name: desc,  label: "Mô tả",         widget: text }

      - file: src/content/process.json
        name: process
        label: "Quy trình thi công (5 bước)"
        fields:
          - name: items
            label: Steps
            widget: list
            min: 5
            max: 5
            summary: "{{fields.n}}. {{fields.title}}"
            fields:
              - { name: n,     label: "Số thứ tự (vd: 01)", widget: string }
              - { name: title, label: "Tên bước",            widget: string }
              - { name: desc,  label: "Mô tả",               widget: text }

      - file: src/content/pricing.json
        name: pricing
        label: "Bảng giá (3 gói)"
        fields:
          - name: items
            label: "Gói dịch vụ"
            widget: list
            min: 3
            max: 3
            summary: "{{fields.name}} — {{fields.price}}đ"
            fields:
              - { name: name,     label: "Tên gói",                 widget: string }
              - { name: sub,      label: "Mô tả ngắn",              widget: string }
              - { name: price,    label: "Giá (vd: 8.000.000)",     widget: string }
              - { name: unit,     label: "Đơn vị (VNĐ/xe 4 chỗ)",   widget: string }
              - name: features
                label: "Tính năng (mỗi dòng 1 tính năng)"
                widget: list
                field: { name: item, label: Item, widget: string }
              - { name: featured, label: "Nổi bật (gói khuyến nghị)", widget: boolean, default: false }

      - file: src/content/testimonials.json
        name: testimonials
        label: "Cảm nhận khách hàng"
        fields:
          - name: items
            label: Reviews
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: text, label: "Nội dung review", widget: text }
              - { name: name, label: "Tên khách",       widget: string }
              - { name: area, label: "Khu vực",         widget: string }

      - file: src/content/faqs.json
        name: faqs
        label: "FAQ (Câu hỏi thường gặp)"
        fields:
          - name: items
            label: FAQs
            widget: list
            summary: "{{fields.q}}"
            fields:
              - { name: q, label: "Câu hỏi",  widget: string }
              - { name: a, label: "Trả lời",  widget: text }

      - file: src/content/videos.json
        name: videos
        label: "Video TikTok (3 thumbnail)"
        fields:
          - name: items
            label: Videos
            widget: list
            min: 3
            max: 3
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Tiêu đề",        widget: string }
              - { name: thumb, label: "Ảnh thumbnail",  widget: image }
              - { name: url,   label: "Link TikTok",    widget: string }

      - file: src/content/beforeAfter.json
        name: beforeAfter
        label: "Trước & Sau (slider)"
        fields:
          - name: items
            label: Pairs
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title,  label: "Tiêu đề",          widget: string }
              - { name: before, label: "Ảnh TRƯỚC",        widget: image }
              - { name: after,  label: "Ảnh SAU",          widget: image }
              - { name: tag,    label: "Loại dịch vụ",     widget: string }

      - file: src/content/showcase.json
        name: showcase
        label: "Cinematic Showcase (heading + nội dung)"
        fields:
          - { name: eyebrow,         label: "Eyebrow (chữ nhỏ trên đầu)",                widget: string }
          - { name: headingLine1,    label: "Dòng tiêu đề 1 (chữ trắng)",                widget: string, hint: "VD: CINEMATIC" }
          - { name: headingLine2,    label: "Dòng tiêu đề 2 (highlight vàng)",           widget: string, hint: "VD: SHOWCASE" }
          - { name: description,     label: "Mô tả ngắn dưới tiêu đề",                   widget: text }
          - { name: scrollHint,      label: "Gợi ý cuộn (góc dưới của heading)",         widget: string, hint: "VD: Cuộn để xem" }
          - { name: endCardEyebrow,  label: "Card cuối — Eyebrow",                       widget: string, hint: "VD: Còn nhiều hơn nữa" }
          - { name: endCardHeading,  label: "Card cuối — Tiêu đề lớn (gradient vàng)",   widget: string, hint: "VD: XEM TẤT CẢ" }
          - { name: endCardCTA,      label: "Card cuối — Nút CTA",                       widget: string, hint: "VD: Vào Gallery" }

  # ============================================================
  # Services (file collection wrapped as a single list — easier to reorder)
  # ============================================================
  - name: services
    label: "🛠️ Dịch vụ (6 dịch vụ chính)"
    delete: false
    editor:
      preview: false
    files:
      - file: src/content/services.json
        name: services
        label: "Danh sách dịch vụ"
        fields:
          - name: items
            label: Services
            widget: list
            summary: "{{fields.n}}. {{fields.title}}"
            fields:
              - { name: n,         label: "Số (01-06)",                widget: string }
              - { name: slug,      label: "Slug URL (vd: wrap-doi-mau)", widget: string }
              - { name: title,     label: "Tên dịch vụ (CHỮ HOA)",     widget: string }
              - { name: desc,      label: "Mô tả ngắn",                widget: text }
              - { name: icon,      label: "Icon",                      widget: select, options: [paint, shield, sun, pen, sparkle, wrench] }
              - { name: cover,     label: "Ảnh đại diện",              widget: image }
              - name: features
                label: "Tính năng nổi bật"
                widget: list
                field: { name: item, label: Item, widget: string }
              - { name: priceFrom, label: "Giá từ (vd: 8.000.000)",    widget: string }

  # ============================================================
  # Portfolio (folder collection — mỗi tác phẩm = 1 file riêng)
  # ============================================================
  - name: portfolio
    label: "🖼️ Tác phẩm (Portfolio)"
    folder: "src/content/portfolio"
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "#{{id}} — {{title}} [{{tag}}]"
    sortable_fields: [id, title, tag, date]
    editor:
      preview: false
    fields:
      - {
          name: slug,
          label: "Slug URL ⚠ MỖI XE PHẢI KHÁC NHAU",
          widget: string,
          pattern: ['^[a-z0-9-]+$', 'Chỉ chữ thường, số và dấu gạch nối (không dấu cách, không chữ HOA, không dấu tiếng Việt)'],
          hint: "VD: porsche-911-satin-gold · land-cruiser-prado-ppf · khi 'Sao chép' để tạo bài mới PHẢI đổi slug khác (nếu không sẽ ghi đè bài cũ)"
        }
      - { name: id,      label: "ID (số — dùng để sort thứ tự hiển thị)", widget: number, value_type: int, min: 1, step: 1 }
      - { name: title,   label: "Tiêu đề tác phẩm (dài, có thể vài dòng)", widget: string }
      - { name: tag,     label: "Loại dịch vụ", widget: select, options: ["Wrap đổi màu", "PPF", "Tem xe", "Film cách nhiệt"] }
      - { name: cover,   label: "Ảnh đại diện (hiển thị ở grid)", widget: image }
      - name: gallery
        label: "Gallery ảnh (hiển thị ở trang chi tiết — kéo thêm ảnh)"
        widget: list
        summary: "Ảnh {{index}}"
        field: { name: image, label: "Ảnh", widget: image }
      - { name: size,    label: "Kích thước trong grid", widget: select, options: [normal, tall, wide], default: normal }
      - { name: featured, label: "Featured (hiển thị ở Cinematic Showcase trang chủ)", widget: boolean, default: false, hint: "Tick để dự án này lên Cinematic Showcase. Nếu không tick item nào, hệ thống tự dùng 6 dự án đầu (theo ID)." }
      - { name: date,    label: "Ngày thi công (tuỳ chọn)", widget: string, required: false, hint: "Vd: 2026-04-15" }
      - name: specs
        label: "Thông số kỹ thuật (key/value)"
        widget: list
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - { name: label, label: "Nhãn (vd: Dòng xe)", widget: string }
          - { name: value, label: "Giá trị", widget: string }
      - { name: description, label: "Mô tả ngắn (hiện ở sidebar)", widget: text, required: false }
      - { name: content, label: "Nội dung chi tiết (xuống dòng 2 lần để tách đoạn)", widget: text, required: false, hint: "Để trống nếu không cần. Phần này hiển thị ở dưới trang chi tiết." }

  # ============================================================
  # Blog posts (folder collection — each post = own file)
  # ============================================================
  - name: posts
    label: "📰 Bài viết Blog"
    folder: "src/content/posts"
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} ({{date}})"
    sortable_fields: [date, title]
    editor:
      preview: false
    fields:
      - { name: slug,     label: "Slug URL",   widget: string, hint: "Vd: huong-dan-chon-mau-wrap-2026 (không dấu, dùng dấu gạch nối)" }
      - { name: title,    label: "Tiêu đề",    widget: string }
      - { name: excerpt,  label: "Tóm tắt",    widget: text }
      - { name: cover,    label: "Ảnh bìa",    widget: image }
      - { name: date,     label: "Ngày đăng",  widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: cat,      label: "Danh mục",   widget: string, hint: "Vd: Wrap Decal, PPF, Film Cách Nhiệt..." }
      - { name: readTime, label: "Thời gian đọc (vd: 6 phút)", widget: string }
      - name: body
        label: "Nội dung (mỗi đoạn nhập 1 dòng)"
        widget: list
        field: { name: paragraph, label: Đoạn, widget: text }
